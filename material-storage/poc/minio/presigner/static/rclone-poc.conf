# Rushes Lab PoC MinIO — rclone config
# 用法:
#   1. 安装 rclone https://rclone.org/downloads/
#   2. 拷贝下面 [poc-minio] 段到 ~/.config/rclone/rclone.conf
#      (Windows: %APPDATA%\rclone\rclone.conf)
#   3. 换 access_key_id / secret_access_key 为你的(alice / bob / 或自己创建的)
#   4. 测试:
#        rclone ls poc-minio:
#        rclone copy ~/Movies/big.mp4 poc-minio:incoming/alice/ --progress
#        rclone copy poc-minio:incoming/alice/big.mp4 ./ --progress
#
# 大文件 + 续传:
#   rclone 默认 multipart upload,自动续传,断网恢复重试。
#   --transfers=4 并发文件数,--multi-thread-streams=4 单文件多线程
#   --s3-chunk-size=64M 调 multipart chunk(默认 5M)
#
# 挂载为本地盘(可选,需 FUSE):
#   mac:  brew install macfuse;rclone mount poc-minio:incoming /Volumes/poc --vfs-cache-mode writes
#   win:  装 WinFsp,rclone mount poc-minio:incoming X:

[poc-minio]
type = s3
provider = Minio
access_key_id = alice
secret_access_key = alicesecret-poc-2026-32chars-pad
endpoint = https://rusheslab.taoxiplan.com
region = us-east-1
acl = private
# 大文件优化(可选)
chunk_size = 64M
upload_concurrency = 4
