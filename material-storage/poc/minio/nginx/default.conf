# Phase 2 完整版:80 反代 MinIO Console + uppy 前端 + presigner API + MinIO S3 API
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;

    # P-22:nginx variable proxy_pass 需要 resolver(docker DNS = 127.0.0.11)
    resolver 127.0.0.11 valid=30s;
    # ─── material-storage ms-api(iter4-8)— exact prefix match,优先于 console /api/ ──
    location ^~ /api/v1/ {
        proxy_pass http://ms-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        client_max_body_size 0;
        proxy_request_buffering off;
    }
    location ^~ /ms-static/ {
        rewrite ^/ms-static/(.*) /static/$1 break;
        proxy_pass http://ms-api:8000;
        proxy_set_header Host $host;
    }
    # ─── MinIO bucket path-style 直传/直下(presigned URL host = 域名)─────
    location ^~ /ms-dev/ {
        proxy_pass http://poc-pigsty-minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location = /ms-healthz {
        proxy_pass http://ms-api:8000/healthz;
        proxy_set_header Host $host;
    }
    # ─── /material-storage ────────────────────────────────────────────────────────


    # 根 / 按 Authorization 头分流:
    # - 有 AWS sigV4(`Authorization: AWS4-HMAC-SHA256 ...`)→ MinIO S3
    #   (Cyberduck / rclone / mc / boto3 等 S3 client 的 ListBuckets / GetBucketLocation 等 root call)
    # - 无 sigV4 → Console SPA(浏览器加载 Console)
    # 解决 S3 client "S3 API Requests must be made to API port" 错(P-22)
    location = / {
        set $root_backend "http://poc-console:9090";
        if ($http_authorization ~ "^AWS4") {
            set $root_backend "http://poc-pigsty-minio:9000";
        }
        proxy_pass $root_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Console 各 path ──────────────────────────────────────────────────────
    # MinIO Console (standalone georgmangold/console) — SPA + REST API
    # fork SUBPATH 只改 base href 不改 API path,故 Console 占根 / 多个子 path;
    # 浏览器 GET / → Console SPA;SPA fetch /api/v1/login → Console API
    location /api/ {
        proxy_pass http://poc-console:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    # P-21:Console UI Object Browser 实时 WebSocket(对象进度 / bucket 变更推送)
    location /ws/ {
        proxy_pass http://poc-console:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1800s;   # 长 connection
        proxy_send_timeout 1800s;
    }
    location /static/ { proxy_pass http://poc-console:9090; proxy_set_header Host $host; }
    location /styles/ { proxy_pass http://poc-console:9090; proxy_set_header Host $host; }
    location = /Loader.svg            { proxy_pass http://poc-console:9090; proxy_set_header Host $host; }
    location = /manifest.json         { proxy_pass http://poc-console:9090; proxy_set_header Host $host; }
    location = /safari-pinned-tab.svg { proxy_pass http://poc-console:9090; proxy_set_header Host $host; }
    location ~ ^/(favicon|apple-icon|browserconfig|mstile)[\w\-]*\.(png|ico|xml|svg)$ {
        proxy_pass http://poc-console:9090;
        proxy_set_header Host $host;
    }
    # /console/ 重定向到根(让旧 link 仍可用)
    location = /console { return 302 /; }
    location = /console/ { return 302 /; }
    # SPA route(/login, /buckets, /users 等)— SPA 用 client-side router;
    # 当浏览器直接访问这些 URL,nginx 走默认 location / 兜底到 Console
    # 但根 /  已 = / proxy_pass Console,默认 / 给 S3。Login 等是 SPA 的 path,
    # 直接刷新会走默认 location /(S3)→ 404。最简:刷新时返回根 → SPA 路由。
    # 用户直接访问 /login 等 SPA route 时:nginx fallback 给 Console serve index.html
    location = /login { proxy_pass http://poc-console:9090; proxy_set_header Host $host; }
    location ~ ^/(buckets|users|policies|groups|tenants|monitoring|tools|settings|configurations|notifications|tiers|account|object-browser|license|support|profile|register)(/|$) {
        proxy_pass http://poc-console:9090;
        proxy_set_header Host $host;
    }

    # ─── uppy 前端 + presigner API ─────────────────────────────────────────────
    location /uppy/ {
        proxy_pass http://poc-presigner:8000/;
        proxy_set_header Host $host;
    }
    location = /health {
        proxy_pass http://poc-presigner:8000/health;
    }
    location /s3/multipart {
        proxy_pass http://poc-presigner:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
    }

    # ─── 默认其它 → MinIO S3 API ────────────────────────────────────────────
    # presigned URL 走这条路径(MinIO 通过 MINIO_SERVER_URL=... 签 URL,
    # 内含 /<bucket>/<key>)。bucket 名不与 Console paths 冲突
    location / {
        proxy_pass http://poc-pigsty-minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 0;
    }
}
