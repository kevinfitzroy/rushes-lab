# Phase 2 完整版:80 反代 MinIO Console + uppy 前端 + presigner API + MinIO S3 API
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;

    # 根 → uppy 前端(redirect)
    location = / {
        return 302 /uppy/;
    }

    # MinIO Console 在 /console/(WebSocket)
    # MinIO 通过 MINIO_BROWSER_REDIRECT_URL=http://server/console 知道自己 base URL
    location /console/ {
        proxy_pass http://poc-pigsty-minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # uppy 前端(presigner serve static)
    location /uppy/ {
        proxy_pass http://poc-presigner:8000/;
        proxy_set_header Host $host;
    }

    # presigner API(uppy AwsS3 plugin endpoint)
    location /health {
        proxy_pass http://poc-presigner:8000/health;
    }
    location /s3/multipart {
        proxy_pass http://poc-presigner:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
    }

    # 默认其它 → MinIO S3 API
    # presigned URL 走这条路径(MinIO 通过 MINIO_SERVER_URL=http://server 签 URL)
    location / {
        proxy_pass http://poc-pigsty-minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 0;
    }
}
