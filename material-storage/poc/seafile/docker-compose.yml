# Seafile Pro + 本地 MinIO PoC docker-compose(v0.5 收敛主推路线)
#
# 落地 v0.5 §3.2 Seafile + 本地 MinIO 作 S3 backend 分层:
#   - Seafile (Pro) 配 [block_backend]/[commit_object_backend]/[fs_object_backend] = s3
#   - MinIO 暴露 S3 API,数据物理写到 ZFS dataset A(由 ${MINIO_DATA_DIR} 挂载)
#   - MinIO bucket notification webhook 推 FastAPI 旁路(commit object PUT → 触发 AI/缩略图)
#
# ⚠️ 关键前提与 2026-05-15 实测 finding(详 file-management-system.md §6.3 F-1~F-6 + ADR-0003)
#
#   F-1: 必须用 MariaDB 10.11 LTS,不要 MySQL 8 —
#        seaf-server 内嵌 libmariadb 不支持 MySQL 8 默认的 caching_sha2_password
#
#   F-2: Seafile image tag — CE latest = 11.0.13(不存在 13.0);Pro 用专属镜像
#        seafileltd/seafile-pro-mc:<ver>(license 申请中)。CE 不支持 S3 backend,
#        本 compose 占位为 :latest(CE),实际部署时替换为 Pro tag
#
#   F-3: 挂载点改名 local_settings.py(不是 seahub_settings.override.py)—
#        Seafile 只自动 import seahub_settings 和 local_settings
#
#   F-4: S3 backend conf 节名 = [block_backend] / [commit_object_backend] /
#        [fs_object_backend],不是 [storage]+[s3];env 注入不可靠,首启后手编 seafile.conf
#
#   F-5: Pro 版 seahub 需 boto3,容器内 pip install boto3 botocore(或自定义 Dockerfile)
#
#   F-6: 端口策略 —— 默认 8081/8083/9000/9001 可能不在云安全组开放;.env 默认搬到 6000-7000
#        MinIO S3 API 不外暴露(仅 docker network 内访问),只暴露 Console
#
# 启动:cp ../.env.example ../.env && vim ../.env && docker compose --env-file ../.env up -d
# 等首启 init ~5min:docker compose logs -f seafile
# 关停:docker compose --env-file ../.env down(数据保留);down -v(连 volumes 一并删)

services:
  # ─── 本地 MinIO 作 Seafile S3 backend ───
  seafile-minio:
    image: minio/minio:latest  # 实际 PoC pin 到具体 tag(例 RELEASE.2025-04-01T00-00-00Z)
    container_name: seafile-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?must set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?must set in .env}
      # Bucket notification → FastAPI 旁路(env vars 启用 webhook target;
      # bucket 级 subscription 用 `mc event add` 在 init 阶段配,见 README)
      MINIO_NOTIFY_WEBHOOK_ENABLE_seafile: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_seafile: ${MINIO_WEBHOOK_ENDPOINT:-http://host.docker.internal:8090/}
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    volumes:
      - ${MINIO_DATA_DIR:?must set in .env}:/data
    ports:
      # MinIO S3 API host 映射已删 — 安全组开放 6000-7000 不含 9000;只在 docker network 内访问
      # 笔记本调 mc 请用 SSH 隧道:ssh -L 9000:localhost:9000 host
      - "${MINIO_CONSOLE_PORT:-6901}:9001"  # MinIO Console (admin UI),建议 6901 进开放区
    networks:
      - seafile-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Seafile Pro (含 seahub web + seaf-server + seafdav + thumbnail) ───
  # ⚠️ image tag 占位:
  #   - 申请 Pro license 前:seafileltd/seafile-mc:latest (CE 11.0.13,但 CE 不支持 S3 backend!仅 boots 不可生产)
  #   - 拿到 Pro license 后:seafileltd/seafile-pro-mc:<patch>(替换并重启)
  seafile:
    image: seafileltd/seafile-mc:latest  # PoC 占位 CE;生产用 seafileltd/seafile-pro-mc:<ver>
    container_name: seafile
    restart: unless-stopped
    depends_on:
      seafile-minio:
        condition: service_healthy
      seafile-mysql:
        condition: service_started
    environment:
      DB_HOST: seafile-mysql
      DB_ROOT_PASSWD: ${SEAFILE_DB_PASSWORD:?must set in .env}
      TIME_ZONE: Asia/Shanghai
      SEAFILE_ADMIN_EMAIL: ${SEAFILE_ADMIN_EMAIL:?must set in .env}
      SEAFILE_ADMIN_PASSWORD: ${SEAFILE_ADMIN_PASSWORD:?must set in .env}
      SEAFILE_SERVER_HOSTNAME: ${SEAFILE_HOST:?must set in .env}
      SEAFILE_SERVER_LETSENCRYPT: "false"
      # ─── S3 backend 配置说明(F-4):env 注入不被 Seafile parse,
      #     首启后手编 /shared/seafile/conf/seafile.conf 三节:
      #       [block_backend]         name = s3, bucket, key_id, key, host, use_v4_signature = true, path_style_request = true, use_https = false
      #       [commit_object_backend] 同上
      #       [fs_object_backend]     同上
      #     restart seafile;详 README §配 S3 backend
    volumes:
      - seafile-data:/shared
      # F-3 修复:挂载点改为 local_settings.py(不是 seahub_settings.override.py)
      - ./config/local_settings.py:/shared/seafile/conf/local_settings.py:ro
    ports:
      - "${SEAFILE_PORT:-6083}:80"  # F-6:默认搬到 6000-7000(原 8083 不在云安全组)
    networks:
      - seafile-net

  # ─── 数据库:MariaDB 10.11 LTS(F-1)───
  # ⚠️ 不要用 MySQL 8 — seaf-server 内嵌 libmariadb 不支持 caching_sha2_password 默认插件,
  #    会导致 seaf-server connect MySQL 全失败 → admin/system repo 创建链 break。
  seafile-mysql:
    image: mariadb:10.11
    container_name: seafile-mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${SEAFILE_DB_PASSWORD:?must set in .env}
    volumes:
      - seafile-mysql-data:/var/lib/mysql
    networks:
      - seafile-net

volumes:
  seafile-data:
  seafile-mysql-data:

networks:
  seafile-net:
