name: material-storage-poc

# v4(iter a1, 2026-05-16):权限模型升级 — 飞书 ID 直接作 subject
#
# 关键变化(v3 → v4):
#   1. subject ID 切飞书 ID:user:<open_id> / department:<dept_id> / group:<group_id>
#                          / organization:<tenant_key>(不再 internal UUID)
#   2. 新增 type department(member 自递归,自然含子部门)
#   3. project 权限三轴并列:viewer / downloader / uploader(全部 ⊃ view)
#      - downloader ⊃ view,uploader ⊃ view,uploader 隐含创建 sub folder
#      - admin ⊃ everything
#      - 支持 subject:user / group#member / department#member
#   4. folder 加 explicit_viewer/downloader/uploader,与 parent 取 union
#      → 子级权限可超父级(应用层 enforce 仅 level-1 folder 才允许 grant)
#   5. sensitive_folder.parent 限 [project](只能挂一级,简化管理)
#      - invited_viewer / invited_downloader 分级邀请
#      - explicit_invited_* 时间限定版
#   6. 移除旧 v3 的 editor / member / explicit_downloader on project
#      (有 admin/viewer/downloader/uploader 已覆盖)

model: |
  model
    schema 1.1

  type user

  type department
    relations
      # 部门成员;子部门 member 自动算父部门 member(递归)
      define member: [user, department#member]

  type group
    relations
      define member: [user, department#member]

  type organization
    relations
      define admin: [user, group#member]
      # 整个企业的"基础"成员资格(可包含 department#member,飞书事件同步时灌入)
      define member: [user, group#member, department#member]

  type project
    relations
      define org: [organization]

      # admin 仅个人 / 群(部门级 admin 太宽泛,不允许)
      define admin: [user, group#member]

      # 三轴并列;subject 支持 user / 群 / 部门(及子部门 via 自递归 member)
      define viewer:     [user, group#member, department#member]
      define downloader: [user, group#member, department#member]
      define uploader:   [user, group#member, department#member]

      # 时间限定下载 grant — 审批通过的临时下载(实习生 30d / 批量下载)
      define explicit_downloader: [user with non_expired_grant]

      # 派生权限(权限蕴含)
      define can_view:     admin or viewer or downloader or uploader or explicit_downloader
      define can_download: admin or downloader or explicit_downloader
      define can_upload:   admin or uploader
      define can_admin:    admin
      # 创建 sub folder = can_upload(隐含)— 业务层 check can_upload on parent

  type folder
    relations
      define parent: [project, folder]

      # 子级可超父级:仅一级 folder 可写(应用层 enforce parent_folder_id IS NULL)
      define explicit_viewer:     [user, group#member, department#member]
      define explicit_downloader: [user, group#member, department#member]
      define explicit_uploader:   [user, group#member, department#member]

      define can_view:     explicit_viewer or explicit_downloader or explicit_uploader or can_view from parent
      define can_download: explicit_downloader or explicit_uploader or can_download from parent
      define can_upload:   explicit_uploader or can_upload from parent
      define can_admin:    can_admin from parent

  type sensitive_folder
    relations
      # 限制只能挂 project(应用层 enforce);model 也对应只列 project
      define parent: [project]

      # 永久邀请
      define invited_viewer:     [user, group#member, department#member]
      define invited_downloader: [user, group#member, department#member]
      # 时间限定邀请
      define explicit_invited_viewer:     [user with non_expired_grant, group#member with non_expired_grant, department#member with non_expired_grant]
      define explicit_invited_downloader: [user with non_expired_grant, group#member with non_expired_grant, department#member with non_expired_grant]

      # sensitive 不从 parent 继承业务权限(完全独立邀请)
      define can_view:     invited_viewer or invited_downloader or explicit_invited_viewer or explicit_invited_downloader
      define can_download: invited_downloader or explicit_invited_downloader
      # 但 admin 来自 parent project(管 sensitive folder 的人 = project admin)
      define can_admin:    can_admin from parent
      # sensitive 上传 = downloader 等级(避免引入额外 invited_uploader)
      define can_upload:   can_download

  type asset
    relations
      define parent: [folder, sensitive_folder]
      # 单文件级临时下载 grant — 审批通过的"就这一个文件给某人"场景
      define explicit_downloader: [user with non_expired_grant]
      define can_view:     explicit_downloader or can_view from parent
      define can_download: explicit_downloader or can_download from parent
      define can_upload:   can_upload from parent
      define can_admin:    can_admin from parent

  condition non_expired_grant(current_time: timestamp, grant_time: timestamp, grant_duration: duration) {
    current_time < grant_time + grant_duration
  }

# ─── 测试 tuples(只为 fga test 准备,生产 seed 走 scripts/seed_demo_data.py)──
tuples:
  # 组织
  - user: user:ou_alice
    relation: admin
    object: organization:tenant_demo

  # 部门嵌套:editing 下挂 motion_design 子部门
  - user: user:ou_evan
    relation: member
    object: department:dep_editing
  - user: user:ou_mia
    relation: member
    object: department:dep_motion_design
  - user: department:dep_motion_design#member
    relation: member
    object: department:dep_editing

  # group:剪辑师组
  - user: user:ou_evan
    relation: member
    object: group:grp_editors
  - user: user:ou_mia
    relation: member
    object: group:grp_editors

  # 项目 demo
  - user: organization:tenant_demo
    relation: org
    object: project:proj_demo
  - user: user:ou_alice
    relation: admin
    object: project:proj_demo
  # 默认 viewer 给整个 editing 部门(含子部门 motion_design member)
  - user: department:dep_editing#member
    relation: viewer
    object: project:proj_demo
  # 默认 downloader 给剪辑师 group
  - user: group:grp_editors#member
    relation: downloader
    object: project:proj_demo

  # 普通 folder 挂 project
  - user: project:proj_demo
    relation: parent
    object: folder:fld_raw_footage
  # 一级 folder explicit grant — 摄影师组下载权限(本 folder 独享)
  - user: group:grp_editors#member
    relation: explicit_downloader
    object: folder:fld_raw_footage

  # sensitive folder(限一级)
  - user: project:proj_demo
    relation: parent
    object: sensitive_folder:sfld_vip_secret
  # 显式邀请 evan 进 sensitive 作 viewer
  - user: user:ou_evan
    relation: invited_viewer
    object: sensitive_folder:sfld_vip_secret
  # 显式邀请 alice 作 downloader(永久,因为是项目 admin 自己也加)
  - user: user:ou_alice
    relation: invited_downloader
    object: sensitive_folder:sfld_vip_secret
  # 临时邀请 mia(motion_design 子部门 member)24h 下载
  - user: user:ou_mia
    relation: explicit_invited_downloader
    object: sensitive_folder:sfld_vip_secret
    condition:
      name: non_expired_grant
      context:
        grant_time: "2026-05-16T10:00:00Z"
        grant_duration: 24h

  # asset on 普通 folder
  - user: folder:fld_raw_footage
    relation: parent
    object: asset:asset_clip_a

  # asset on sensitive folder
  - user: sensitive_folder:sfld_vip_secret
    relation: parent
    object: asset:asset_vip_clip


tests:
  - name: v4 权限模型 e2e
    check:
      # ─── alice(org admin + project admin)── 全权 ────
      - user: user:ou_alice
        object: project:proj_demo
        assertions:
          admin: true
          can_view: true
          can_download: true
          can_upload: true
          can_admin: true

      - user: user:ou_alice
        object: sensitive_folder:sfld_vip_secret
        assertions:
          can_admin: true   # 从 project admin 继承
          can_view: true    # 也是 invited_downloader
          can_download: true

      - user: user:ou_alice
        object: asset:asset_vip_clip
        assertions:
          can_view: true
          can_download: true
          can_admin: true

      # ─── evan(editing 部门 member + editors group)─────
      # editing 部门 → 项目 viewer;editors group → 项目 downloader → can_view+can_download
      - user: user:ou_evan
        object: project:proj_demo
        assertions:
          can_view: true
          can_download: true
          can_upload: false
          can_admin: false

      - user: user:ou_evan
        object: folder:fld_raw_footage
        assertions:
          can_view: true        # 继承 project
          can_download: true    # editors group explicit_downloader on folder + inherit project
          can_upload: false
          can_admin: false

      - user: user:ou_evan
        object: asset:asset_clip_a
        assertions:
          can_view: true
          can_download: true

      - user: user:ou_evan
        object: sensitive_folder:sfld_vip_secret
        assertions:
          can_view: true        # invited_viewer
          can_download: false   # 不是 invited_downloader
          can_upload: false

      - user: user:ou_evan
        object: asset:asset_vip_clip
        assertions:
          can_view: true
          can_download: false   # sensitive 邀请只有 viewer 等级

      # ─── mia(子部门 motion_design member,自动算 editing member)─────
      # 子部门 → 父部门 → project viewer
      # 也是 editors group member → project downloader
      # sensitive 上 24h explicit_invited_downloader
      - user: user:ou_mia
        object: project:proj_demo
        assertions:
          can_view: true
          can_download: true     # via editors group

      - user: user:ou_mia
        object: sensitive_folder:sfld_vip_secret
        context:
          current_time: "2026-05-17T05:00:00Z"   # +19h, 在 24h 内
        assertions:
          can_view: true
          can_download: true

      - user: user:ou_mia
        object: sensitive_folder:sfld_vip_secret
        context:
          current_time: "2026-05-17T11:00:00Z"   # +25h, 已过期
        assertions:
          can_view: false
          can_download: false

      # ─── 完全外部 user(不在任何 dept/group/project)──
      - user: user:ou_outsider
        object: project:proj_demo
        assertions:
          can_view: false
          can_download: false

      - user: user:ou_outsider
        object: sensitive_folder:sfld_vip_secret
        assertions:
          can_view: false
          can_download: false
