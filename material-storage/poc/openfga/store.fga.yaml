name: material-storage-poc

# v2(Phase B-2 next iteration 简化):
#   - 取消 sensitive_folder type(用户反馈:不必区分敏感/普通)
#   - 单一 folder type;权限粒度通过 grant 的 object 级别(project/asset)区分
#   - 临时下载 grant 在 **两层**:
#       project 级:批量(实习生 30d / 单次申请下载整 project)
#       asset 级:文件级(申请单个文件)
#   - project.visibility 字段(public/private/stealth)由 material-storage backend
#     处理,不进 OpenFGA model(metadata 是 DB 层 filter,不是 ReBAC 关系)

model: |
  model
    schema 1.1

  type user

  type group
    relations
      define member: [user]

  type organization
    relations
      define admin: [user, group#member]
      define member: [user, group#member]

  type project
    relations
      define organization: [organization]
      define admin: [user, group#member] or admin from organization
      define editor: [user, group#member] or admin
      define member: [user, group#member] or editor
      # 临时下载 grant(project 级:申请通过后批量下载)
      define explicit_downloader: [user with non_expired_grant]
      define can_view: member
      define can_download: member or explicit_downloader
      define can_edit: editor
      define can_admin: admin

  type folder
    relations
      define parent: [project, folder]
      define can_view: can_view from parent
      define can_download: can_download from parent
      define can_edit: can_edit from parent
      define can_admin: can_admin from parent

  type asset
    relations
      define parent: [project, folder]
      # 文件级临时下载 grant(申请单个文件,审批通过后短期)
      define explicit_downloader: [user with non_expired_grant]
      define can_view: can_view from parent or explicit_downloader
      define can_download: can_download from parent or explicit_downloader
      define can_edit: can_edit from parent
      define can_delete: can_admin from parent

  condition non_expired_grant(current_time: timestamp, grant_time: timestamp, grant_duration: duration) {
    current_time < grant_time + grant_duration
  }

tuples:
  # ─── alice = org admin ─────────────────────────
  - user: user:alice
    relation: admin
    object: organization:my-clinic

  # ─── bob in group:photographers ────────────────
  - user: user:bob
    relation: member
    object: group:photographers

  # ─── project organization ─────────────────────
  - user: organization:my-clinic
    relation: organization
    object: project:case-2025-q4

  # ─── photographers group in project = editor ───
  - user: group:photographers#member
    relation: editor
    object: project:case-2025-q4

  # ─── 文件夹层次(普通 folder,不再 sensitive_folder)─
  - user: project:case-2025-q4
    relation: parent
    object: folder:raw

  - user: project:case-2025-q4
    relation: parent
    object: folder:client-private

  # ─── asset 归属 ─────────────────────────────────
  - user: folder:raw
    relation: parent
    object: asset:clip-1-raw

  - user: folder:client-private
    relation: parent
    object: asset:clip-99-secret

  # ─── charlie (org 外人 / 低权限 user) 申请下载 clip-99-secret ─
  # 飞书审批通过 → 写 file-level 1h grant
  - user: user:charlie
    relation: explicit_downloader
    object: asset:clip-99-secret
    condition:
      name: non_expired_grant
      context:
        grant_time: "2026-05-16T10:00:00Z"
        grant_duration: 1h

  # ─── david(实习生) 申请加入 project 30d ─────
  - user: user:david
    relation: explicit_downloader
    object: project:case-2025-q4
    condition:
      name: non_expired_grant
      context:
        grant_time: "2026-05-16T10:00:00Z"
        grant_duration: 720h    # 30 day

tests:
  - name: v2 简化模型 e2e
    check:
      # ─── alice 全权 ─────────────────────────────
      - user: user:alice
        object: project:case-2025-q4
        assertions:
          admin: true
          editor: true
          member: true

      - user: user:alice
        object: asset:clip-99-secret
        assertions:
          can_view: true
          can_download: true
          can_delete: true

      # ─── bob(project editor)看下所有 ─────────
      - user: user:bob
        object: project:case-2025-q4
        assertions:
          editor: true
          member: true

      - user: user:bob
        object: asset:clip-1-raw
        assertions:
          can_view: true
          can_download: true
          can_edit: true
          can_delete: false

      - user: user:bob
        object: asset:clip-99-secret
        assertions:
          can_view: true       # bob 是 project member,自然 view 项目内所有 asset
          can_download: true   # member 默认可下
          can_delete: false

      # ─── charlie(file-level grant 期内)──────
      - user: user:charlie
        object: asset:clip-99-secret
        context:
          current_time: "2026-05-16T10:30:00Z"   # grant + 30 min
        assertions:
          can_view: true       # via explicit_downloader
          can_download: true
          can_delete: false

      # ─── charlie(file-level grant 边界 11:00)─
      - user: user:charlie
        object: asset:clip-99-secret
        context:
          current_time: "2026-05-16T11:00:00Z"   # 到期边界
        assertions:
          can_view: false      # grant 失效,charlie 非 project member
          can_download: false

      # ─── charlie 别的 asset(没 grant)─────────
      - user: user:charlie
        object: asset:clip-1-raw
        context:
          current_time: "2026-05-16T10:30:00Z"
        assertions:
          can_view: false
          can_download: false

      # ─── david(project-level grant 期内,30 day)─
      - user: user:david
        object: project:case-2025-q4
        context:
          current_time: "2026-05-20T10:00:00Z"   # grant + 4 day
        assertions:
          member: false        # 不是真 member,只有临时下载权
          can_view: false      # can_view 只 member,无临时
          can_download: true   # 通过 explicit_downloader

      - user: user:david
        object: asset:clip-1-raw
        context:
          current_time: "2026-05-20T10:00:00Z"
        assertions:
          can_view: false      # 同上,project 级 grant 不传 view 给 asset 级
          can_download: true   # asset.can_download = can_download from parent or explicit_downloader

      # ─── david(grant 过期,grant + 31 day)──
      - user: user:david
        object: asset:clip-1-raw
        context:
          current_time: "2026-06-16T11:00:00Z"
        assertions:
          can_view: false
          can_download: false
