name: material-storage-poc

# v3(Phase B-2 iter3):重新引入 sensitive_folder 但新语义为 "邀请制可见性"
#   - 普通 folder:project member 自动可见 + 可下载(从 project 继承)
#   - sensitive_folder:即使 project member 也必须显式邀请才能看到 folder + 内容
#     * invited: [user, group#member]    永久邀请(owner/admin grant)
#     * explicit_invited: [user with non_expired_grant]   临时邀请(time-limited)
#     * admin from parent:project admin / owner 自然继承(管理权)
#   - 文件级 explicit_downloader 保留:跨 folder 单文件审批下载(asset 级临时 grant)
#   - project.visibility 由 material-storage backend DB 层处理,不进 model
#
# 4 层粒度:
#   1. project.visibility(metadata 列表,DB filter)
#   2. project member(普通 folder 全权)
#   3. sensitive_folder invited / explicit_invited(项目内敏感目录隔离)
#   4. asset explicit_downloader(单文件跨 folder 申请下载)

model: |
  model
    schema 1.1

  type user

  type group
    relations
      define member: [user]

  type organization
    relations
      define admin: [user, group#member]
      define member: [user, group#member]

  type project
    relations
      define organization: [organization]
      define admin: [user, group#member] or admin from organization
      define editor: [user, group#member] or admin
      define member: [user, group#member] or editor
      # project 级临时下载 grant(实习生 30d / 批量场景)
      define explicit_downloader: [user with non_expired_grant]
      define can_view: member
      define can_download: member or explicit_downloader
      define can_edit: editor
      define can_admin: admin

  type folder
    relations
      define parent: [project, folder]
      define can_view: can_view from parent
      define can_download: can_download from parent
      define can_edit: can_edit from parent
      define can_admin: can_admin from parent

  type sensitive_folder
    relations
      define parent: [project, folder, sensitive_folder]
      # 显式邀请的 member(永久邀请)— admin / owner grant
      define invited: [user, group#member]
      # 临时邀请(time-limited)— admin grant 的限期访问
      define explicit_invited: [user with non_expired_grant]
      # admin 从 parent 项目继承(owner / project admin 自然可见可管理)
      define admin: can_admin from parent
      # 可见 = admin + invited(永久)+ explicit_invited(临时)
      define can_view: admin or invited or explicit_invited
      define can_download: can_view
      define can_edit: admin
      define can_admin: admin

  type asset
    relations
      define parent: [project, folder, sensitive_folder]
      # 跨 folder 单文件审批下载 grant
      define explicit_downloader: [user with non_expired_grant]
      define can_view: can_view from parent or explicit_downloader
      define can_download: can_download from parent or explicit_downloader
      define can_edit: can_edit from parent
      define can_delete: can_admin from parent

  condition non_expired_grant(current_time: timestamp, grant_time: timestamp, grant_duration: duration) {
    current_time < grant_time + grant_duration
  }

tuples:
  # ─── alice = org admin ─────────────────────────
  - user: user:alice
    relation: admin
    object: organization:my-clinic

  # ─── bob in group:photographers ────────────────
  - user: user:bob
    relation: member
    object: group:photographers

  # ─── eve(普通 project member 同 photographers)─
  - user: user:eve
    relation: member
    object: group:photographers

  # ─── project ──────────────────────────────────
  - user: organization:my-clinic
    relation: organization
    object: project:case-2025-q4

  - user: group:photographers#member
    relation: editor
    object: project:case-2025-q4

  # ─── 普通 folder(project member 自动可见)─────
  - user: project:case-2025-q4
    relation: parent
    object: folder:raw

  # ─── 敏感 folder(邀请制)──────────────────────
  - user: project:case-2025-q4
    relation: parent
    object: sensitive_folder:client-vips

  # ─── alice 显式邀请 bob 永久访问 sensitive_folder ─
  - user: user:bob
    relation: invited
    object: sensitive_folder:client-vips

  # ─── alice 临时邀请 charlie(实习生)30d 访问 sensitive_folder ─
  - user: user:charlie
    relation: explicit_invited
    object: sensitive_folder:client-vips
    condition:
      name: non_expired_grant
      context:
        grant_time: "2026-05-16T10:00:00Z"
        grant_duration: 720h    # 30 day

  # ─── assets ───────────────────────────────────
  - user: folder:raw
    relation: parent
    object: asset:clip-1-raw

  - user: sensitive_folder:client-vips
    relation: parent
    object: asset:clip-99-vip-secret

  # ─── david(org 外人) 申请下载单个文件 1h ─────
  - user: user:david
    relation: explicit_downloader
    object: asset:clip-99-vip-secret
    condition:
      name: non_expired_grant
      context:
        grant_time: "2026-05-16T10:00:00Z"
        grant_duration: 1h

tests:
  - name: v3 4-layer 模型 e2e
    check:
      # ─── alice(org admin)全权 ─────────────────
      - user: user:alice
        object: project:case-2025-q4
        assertions:
          admin: true
          editor: true
          member: true

      - user: user:alice
        object: sensitive_folder:client-vips
        assertions:
          admin: true       # 从 project admin 继承
          can_view: true    # admin OR invited OR explicit_invited
          can_admin: true

      - user: user:alice
        object: asset:clip-99-vip-secret
        assertions:
          can_view: true
          can_download: true
          can_delete: true   # admin from parent (sensitive_folder.admin)

      # ─── bob(project editor + 显式 invited 到 sensitive)─
      - user: user:bob
        object: project:case-2025-q4
        assertions:
          editor: true
          member: true

      - user: user:bob
        object: folder:raw
        assertions:
          can_view: true       # project member 自然可见
          can_download: true
          can_edit: true

      - user: user:bob
        object: sensitive_folder:client-vips
        assertions:
          can_view: true       # invited (永久)
          can_download: true
          can_admin: false     # 非 project admin
          can_edit: false      # editor 是 admin only(敏感 folder editor = admin)

      - user: user:bob
        object: asset:clip-99-vip-secret
        assertions:
          can_view: true       # via sensitive_folder.can_view
          can_download: true
          can_delete: false

      # ─── eve(project editor 同 group,但 NOT invited 到 sensitive)─
      - user: user:eve
        object: project:case-2025-q4
        assertions:
          editor: true
          member: true

      - user: user:eve
        object: folder:raw
        assertions:
          can_view: true       # project member 自动可见 普通 folder
          can_download: true

      - user: user:eve
        object: sensitive_folder:client-vips
        assertions:
          can_view: false      # ❌ 即使是 project editor,sensitive 必须 invited
          can_download: false

      - user: user:eve
        object: asset:clip-99-vip-secret
        assertions:
          can_view: false      # ❌ 看不到 sensitive folder 内文件
          can_download: false

      # ─── charlie(实习生临时邀请 30d)─────────
      - user: user:charlie
        object: sensitive_folder:client-vips
        context:
          current_time: "2026-05-20T10:00:00Z"   # grant + 4 day,在 30d 内
        assertions:
          can_view: true       # explicit_invited (时间内)
          can_download: true
          can_admin: false

      - user: user:charlie
        object: asset:clip-99-vip-secret
        context:
          current_time: "2026-05-20T10:00:00Z"
        assertions:
          can_view: true
          can_download: true

      # ─── charlie 实习期满 31d 后 ──────────────
      - user: user:charlie
        object: sensitive_folder:client-vips
        context:
          current_time: "2026-06-16T11:00:00Z"   # grant + 31 day,过期
        assertions:
          can_view: false      # explicit_invited 过期失效
          can_download: false

      # ─── david(file-level grant 1h 内)──────
      - user: user:david
        object: asset:clip-99-vip-secret
        context:
          current_time: "2026-05-16T10:30:00Z"   # grant + 30 min
        assertions:
          can_view: true       # explicit_downloader on asset
          can_download: true

      # ─── david(file-level grant 过期)────────
      - user: user:david
        object: asset:clip-99-vip-secret
        context:
          current_time: "2026-05-16T11:00:00Z"   # 到期边界
        assertions:
          can_view: false
          can_download: false

      # ─── david(没 grant 别的 sensitive 文件)─
      - user: user:david
        object: asset:clip-1-raw
        context:
          current_time: "2026-05-16T10:30:00Z"
        assertions:
          can_view: false      # 非 project member,无 grant
          can_download: false
